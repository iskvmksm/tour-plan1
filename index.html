<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Best Tour Plan - Hotel Booking </title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&family=Nunito:wght@400;700;800&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
	<link rel="stylesheet" href="css/style.css">
</head>

<body>
	<header class="navbar">
		<div class="container">
			<div class="navbar-top">
				<a href="#" class="logo">
					<img src="img/horizontal-logo.svg" alt="Logo: Best Tour Plan" class="logo__image">
				</a>

				<form action="#" class="search navbar__search">
					<input type="text" class="search__input" placeholder="Search Location">
					<button class="search__button">
						<img src="img/search.svg" alt="Icon: search">
					</button>
				</form>

				<a href="#" class="user navbar-user">
					<img src="img/user-avatar.png" alt="Avatar: Nathan" class="user__avatar">
					<span class="user__name">Nathan</span>
				</a>
				<!-- /.user -->
				<button class="menu-button navbar-top__menu-button">
					<span class="menu-button__line"></span>
					<span class="menu-button__line"></span>
					<span class="menu-button__line"></span>
				</button>
			</div>
			<!-- /.navbar-top -->
		</div>
		<!-- /.container -->
		<nav class="navbar-botton">
			<div class="container">
				<ul class="navbar-menu">
					<li class="navbar-menu__item"><a href="#" class="navbar-menu__link">All Dealls</a></li>
					<li class="navbar-menu__item"><a href="#" class="navbar-menu__link">Hotels</a></li>
					<li class="navbar-menu__item"><a href="#" class="navbar-menu__link">Activities</a></li>
					<li class="navbar-menu__item"><a href="#" class="navbar-menu__link">Hotel Day Packages</a></li>
					<li class="navbar-menu__item"><a href="#" class="navbar-menu__link">Restaurants</a></li>
					<li class="navbar-menu__item"><a href="#" class="navbar-menu__link">Events</a></li>
					<li class="navbar-menu__item"><a href="#" class="navbar-menu__link">Rodrigues</a></li>
				</ul>
			</div>
			<!-- /.container -->
		</nav>
		<!-- /.navbar-menu -->
	</header>
	<nav class="breadcrump">
		<div class="container">
			<ul class="breadcrump-list">
				<li class="breadcrump-list__item">
					<a href="#" class="breadcrump-list__link">Home</a>
				</li>
				<li class="breadcrump-list__item">
					<a href="#" class="breadcrump-list__link">Flash Offers</a>
				</li>
				<li class="breadcrump-list__item">
					Grand Hilton Hotel
				</li>
			</ul>
		</div>
		<!-- /.container -->
	</nav>
	<!-- /.breadcrump -->
	<section class="hotel">
		<div class="container">
			<div class="hotel-info">
				<div class="hotel-info__text">
					<div class="hotel-wrapper">
						<div class="stars">
							<img src="img/star.svg" alt="star">
							<img src="img/star.svg" alt="star">
							<img src="img/star.svg" alt="star">
							<img src="img/star.svg" alt="star">
							<img src="img/star.svg" alt="star">
						</div>
						<h1 class="hotel-name hotel-info__name">GRAND HILTON HOTEL</h1>
						<span class="offer hotel-info__offer">Flash Offer</span>
					</div>
					<p class="hotel-description hotel-info__description">Half-Board/ All Inclusive + Complimentary Activities +
						Child Stays Free</p>
				</div>
				<!-- /.hotel-info__text -->
				<div class="rating hotel-info__rating">
					<span class="rating__text">User Rattings</span>
					<span class="rating__counter">4.5/5</span>
				</div>
				<!-- /.hotel-info__right -->
			</div>
			<div class="hotel-grid">
				<div class="slider">
					<div class="swiper">
						<!-- Additional required wrapper -->
						<div class="swiper-wrapper">
							<div class="swiper-slide"><img src="img/slide.jpg" alt="slide"></div>
							<div class="swiper-slide"><img src="img/slide.jpg" alt="slide"></div>
							<div class="swiper-slide"><img src="img/slide.jpg" alt="slide"></div>
						</div>
						<button class="swiper-button swiper-button--prev"></button>
						<button class="swiper-button swiper-button--next"></button>

					</div>
				</div>
				<!-- /.swiper -->
			</div>
		</div>
		<!-- /.container -->
	</section>
	<!-- /.hotel -->
	<!-- /.hotel-grid -->

	<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
	<script src="js/main.js"></script>
</body>

</html>
